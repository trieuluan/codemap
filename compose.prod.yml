services:
  app:
    image: ghcr.io/your-org/codemap-api:latest
    container_name: codemap-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    image: ghcr.io/your-org/codemap-api:latest
    container_name: codemap-worker
    restart: unless-stopped
    env_file:
      - .env
    command: ["npm", "run", "start:worker"]
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-18}
    container_name: ${POSTGRES_CONTAINER_NAME:-codemap_pg}
    restart: ${POSTGRES_RESTART_POLICY:-unless-stopped}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - codemap_postgres_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: codemap-redis
    restart: unless-stopped
    volumes:
      - codemap_redis_data:/data

volumes:
  codemap_postgres_data:
  codemap_redis_data:
