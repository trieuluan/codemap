<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Surface scale</title></head><body><div class="card">
  <div class="eyebrow">Dark surface scale</div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">
    <div class="swatch"><div class="chip" style="background:oklch(0.07 0 0)"></div><div class="name">background</div><div class="meta">L 0.07</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.09 0 0)"></div><div class="name">sidebar</div><div class="meta">L 0.09</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.11 0 0)"></div><div class="name">card / popover</div><div class="meta">L 0.11</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.15 0 0)"></div><div class="name">sidebar-accent</div><div class="meta">L 0.15</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.18 0 0)"></div><div class="name">secondary / muted</div><div class="meta">L 0.18</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.22 0 0)"></div><div class="name">border / input</div><div class="meta">L 0.22</div></div>
  </div>
  <div class="eyebrow" style="margin-top:6px">Foreground</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div class="swatch"><div class="chip" style="background:oklch(0.4 0 0)"></div><div class="name">ring</div><div class="meta">L 0.40</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.55 0 0)"></div><div class="name">muted-fg</div><div class="meta">L 0.55</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.95 0 0)"></div><div class="name">foreground</div><div class="meta">L 0.95</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.98 0 0)"></div><div class="name">primary</div><div class="meta">L 0.98</div></div>
  </div>
</div></body></html>
