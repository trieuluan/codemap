<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Stat card</title></head><body><div class="card">
  <div class="eyebrow">Stat card — used on /dashboard</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)">
      <div style="width:40px;height:40px;border-radius:10px;background:var(--secondary);display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
      </div>
      <div><div style="font-size:24px;font-weight:600">12</div><div style="font-size:13px;color:var(--muted-foreground)">Projects</div></div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)">
      <div style="width:40px;height:40px;border-radius:10px;background:var(--secondary);display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <div><div style="font-size:24px;font-weight:600">2,847</div><div style="font-size:13px;color:var(--muted-foreground)">API Calls</div></div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)">
      <div style="width:40px;height:40px;border-radius:10px;background:var(--secondary);display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div><div style="font-size:24px;font-weight:600">8</div><div style="font-size:13px;color:var(--muted-foreground)">Team Members</div></div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)">
      <div style="width:40px;height:40px;border-radius:10px;background:var(--secondary);display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div><div style="font-size:24px;font-weight:600">100%</div><div style="font-size:13px;color:var(--muted-foreground)">Uptime</div></div>
    </div>
  </div>
</div></body></html>
