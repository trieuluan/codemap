<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Status colors</title></head><body><div class="card">
  <div class="eyebrow">Status — color is reserved for state, never chrome</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px">
    <div>
      <div class="row" style="gap:10px">
        <div style="width:56px;height:56px;border-radius:10px;background:oklch(0.7 0.15 145)"></div>
        <div class="col" style="gap:2px">
          <div class="name" style="font-size:13px;font-weight:600">success</div>
          <div class="meta">oklch(0.7 0.15 145)</div>
          <div class="meta" style="color:oklch(0.7 0.15 145)">● Active · ● Ready · ● Online</div>
        </div>
      </div>
    </div>
    <div>
      <div class="row" style="gap:10px">
        <div style="width:56px;height:56px;border-radius:10px;background:oklch(0.55 0.2 25)"></div>
        <div class="col" style="gap:2px">
          <div class="name" style="font-size:13px;font-weight:600">destructive</div>
          <div class="meta">oklch(0.55 0.2 25)</div>
          <div class="meta" style="color:oklch(0.55 0.2 25)">● Failed · ● Revoked · ● Sign out</div>
        </div>
      </div>
    </div>
  </div>
  <div class="eyebrow" style="margin-top:6px">Charts</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
    <div class="swatch"><div class="chip" style="background:oklch(0.7 0.15 160)"></div><div class="name">chart-1</div><div class="meta">160°</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.65 0.18 250)"></div><div class="name">chart-2</div><div class="meta">250°</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.75 0.12 80)"></div><div class="name">chart-3</div><div class="meta">80°</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.6 0.15 300)"></div><div class="name">chart-4</div><div class="meta">300°</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.7 0.2 30)"></div><div class="name">chart-5</div><div class="meta">30°</div></div>
  </div>
</div></body></html>
