<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Empty state</title></head><body><div class="card">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:var(--shadow-sm)">
    <div style="font:500 16px var(--font-sans);margin-bottom:12px">Recent Activity</div>
    <div style="border:1px dashed var(--border);background:color-mix(in oklch, var(--background) 40%, transparent);border-radius:10px;padding:32px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center">
      <div style="width:40px;height:40px;border-radius:10px;background:var(--secondary);display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div style="font:500 14px var(--font-sans)">No activity yet</div>
      <div style="font:400 13px var(--font-sans);color:var(--muted-foreground);max-width:300px">Your recent activity will appear here once you start using CodeMap.</div>
    </div>
  </div>
</div></body></html>
