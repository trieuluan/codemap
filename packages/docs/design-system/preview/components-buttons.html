<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Buttons</title></head><body><div class="card">
  <div class="eyebrow">Buttons — Geist 500, h-9 · rounded-md</div>
  <div class="row" style="gap:8px">
    <button style="height:36px;padding:0 16px;border-radius:8px;border:0;background:var(--primary);color:var(--primary-foreground);font:500 14px var(--font-sans);cursor:pointer">Create API key</button>
    <button style="height:36px;padding:0 16px;border-radius:8px;border:0;background:var(--secondary);color:var(--secondary-foreground);font:500 14px var(--font-sans);cursor:pointer">Cancel</button>
    <button style="height:36px;padding:0 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--foreground);font:500 14px var(--font-sans);cursor:pointer">View docs</button>
    <button style="height:36px;padding:0 12px;border-radius:8px;border:0;background:transparent;color:var(--foreground);font:500 14px var(--font-sans);cursor:pointer">Sign in</button>
    <button style="height:36px;padding:0 16px;border-radius:8px;border:0;background:var(--destructive);color:var(--destructive-foreground);font:500 14px var(--font-sans);cursor:pointer">Revoke</button>
  </div>
  <div class="row" style="gap:8px;margin-top:2px">
    <button style="height:32px;padding:0 12px;border-radius:8px;border:0;background:var(--primary);color:var(--primary-foreground);font:500 13px var(--font-sans)">sm · default</button>
    <button style="height:36px;padding:0 16px;border-radius:8px;border:0;background:var(--primary);color:var(--primary-foreground);font:500 14px var(--font-sans)">default</button>
    <button style="height:40px;padding:0 24px;border-radius:8px;border:0;background:var(--primary);color:var(--primary-foreground);font:500 14px var(--font-sans)">lg</button>
    <button style="width:36px;height:36px;border-radius:8px;border:0;background:var(--secondary);color:var(--foreground);font:500 14px var(--font-sans)">⌕</button>
  </div>
</div></body></html>
