<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Badges</title></head><body><div class="card">
  <div class="eyebrow">Badges — h-5, px-2, text-xs 500, rounded-md</div>
  <div class="row" style="gap:8px">
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;background:var(--primary);color:var(--primary-foreground);font:500 12px var(--font-sans)">Default</span>
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;background:var(--secondary);color:var(--secondary-foreground);font:500 12px var(--font-sans)">Secondary</span>
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;border:1px solid var(--border);color:var(--foreground);font:500 12px var(--font-sans)">Outline</span>
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;background:var(--destructive);color:#fff;font:500 12px var(--font-sans)">Destructive</span>
  </div>
  <div class="eyebrow" style="margin-top:6px">Status — outline + tinted text</div>
  <div class="row" style="gap:8px">
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;border:1px solid color-mix(in oklch, oklch(0.7 0.15 145) 40%, transparent);color:oklch(0.7 0.15 145);font:500 12px var(--font-sans)">Active</span>
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;border:1px solid color-mix(in oklch, #f59e0b 40%, transparent);color:#f59e0b;font:500 12px var(--font-sans)">Expired</span>
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;border:1px solid color-mix(in oklch, var(--destructive) 40%, transparent);color:var(--destructive);font:500 12px var(--font-sans)">Revoked</span>
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;background:var(--secondary);color:var(--secondary-foreground);font:500 12px var(--font-mono)">draft</span>
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;background:var(--secondary);color:var(--secondary-foreground);font:500 12px var(--font-mono)">importing</span>
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;background:var(--secondary);color:var(--secondary-foreground);font:500 12px var(--font-mono)">ready</span>
  </div>
</div></body></html>
