<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Spacing</title></head><body><div class="card">
  <div class="eyebrow">Spacing scale · Tailwind 4px base</div>
  <div class="col" style="gap:6px">
    <div class="row"><div style="width:4px;height:14px;background:var(--foreground)"></div><span class="mono" style="font-size:11px;color:var(--muted-foreground)">space-1 · 4px · gap inside chips</span></div>
    <div class="row"><div style="width:8px;height:14px;background:var(--foreground)"></div><span class="mono" style="font-size:11px;color:var(--muted-foreground)">space-2 · 8px · button gap, icon+label</span></div>
    <div class="row"><div style="width:12px;height:14px;background:var(--foreground)"></div><span class="mono" style="font-size:11px;color:var(--muted-foreground)">space-3 · 12px · sidebar nav padding</span></div>
    <div class="row"><div style="width:16px;height:14px;background:var(--foreground)"></div><span class="mono" style="font-size:11px;color:var(--muted-foreground)">space-4 · 16px · grid gap, card row</span></div>
    <div class="row"><div style="width:24px;height:14px;background:var(--foreground)"></div><span class="mono" style="font-size:11px;color:var(--muted-foreground)">space-6 · 24px · card padding, section gap</span></div>
    <div class="row"><div style="width:32px;height:14px;background:var(--foreground)"></div><span class="mono" style="font-size:11px;color:var(--muted-foreground)">space-8 · 32px · between page sections</span></div>
  </div>
</div></body></html>
