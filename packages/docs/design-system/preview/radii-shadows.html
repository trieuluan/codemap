<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Radii & shadows</title></head><body><div class="card">
  <div class="eyebrow">Radii — base 10px</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">
    <div class="swatch"><div style="width:100%;aspect-ratio:1.4/1;border-radius:6px;background:var(--card);border:1px solid var(--border)"></div><div class="name">sm · 6</div></div>
    <div class="swatch"><div style="width:100%;aspect-ratio:1.4/1;border-radius:8px;background:var(--card);border:1px solid var(--border)"></div><div class="name">md · 8 · btn</div></div>
    <div class="swatch"><div style="width:100%;aspect-ratio:1.4/1;border-radius:10px;background:var(--card);border:1px solid var(--border)"></div><div class="name">lg · 10 · tile</div></div>
    <div class="swatch"><div style="width:100%;aspect-ratio:1.4/1;border-radius:14px;background:var(--card);border:1px solid var(--border)"></div><div class="name">xl · 14 · card</div></div>
    <div class="swatch"><div style="width:100%;aspect-ratio:1.4/1;border-radius:9999px;background:var(--card);border:1px solid var(--border)"></div><div class="name">full · avatar</div></div>
  </div>
  <div class="eyebrow" style="margin-top:8px">Shadows — minimal; depth via lightness</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
    <div class="swatch"><div style="width:100%;aspect-ratio:2/1;border-radius:10px;background:var(--card);box-shadow:var(--shadow-xs)"></div><div class="name">shadow-xs</div><div class="meta">buttons</div></div>
    <div class="swatch"><div style="width:100%;aspect-ratio:2/1;border-radius:10px;background:var(--card);box-shadow:var(--shadow-sm)"></div><div class="name">shadow-sm</div><div class="meta">cards</div></div>
    <div class="swatch"><div style="width:100%;aspect-ratio:2/1;border-radius:10px;background:var(--card);box-shadow:var(--shadow-md)"></div><div class="name">shadow-md</div><div class="meta">popover</div></div>
  </div>
</div></body></html>
