<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Card anatomy</title></head><body><div class="card">
  <div class="eyebrow">Card · bg-card · border · rounded-xl · shadow-sm · py-6 px-6</div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:var(--shadow-sm);display:flex;justify-content:space-between;align-items:flex-start;gap:24px">
    <div>
      <div style="font:600 16px var(--font-sans);margin-bottom:4px">API Keys</div>
      <div style="font:400 13px var(--font-sans);color:var(--muted-foreground);max-width:340px">Create and revoke personal keys for MCP clients, scripts, and local integrations.</div>
    </div>
    <button style="height:36px;padding:0 16px;border-radius:8px;border:0;background:var(--primary);color:var(--primary-foreground);font:500 14px var(--font-sans);white-space:nowrap">Create API key</button>
  </div>
</div></body></html>
