<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Semantic tokens</title></head><body><div class="card">
  <div class="eyebrow">Semantic role tokens (shadcn names — used everywhere)</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;font-size:12px">
    <div class="row" style="justify-content:space-between;padding:8px 12px;background:var(--background);border:1px solid var(--border);border-radius:6px">
      <span class="mono" style="color:var(--muted-foreground)">--background</span><span style="color:var(--foreground)">app bg</span>
    </div>
    <div class="row" style="justify-content:space-between;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px">
      <span class="mono" style="color:var(--muted-foreground)">--card</span><span style="color:var(--foreground)">surfaces</span>
    </div>
    <div class="row" style="justify-content:space-between;padding:8px 12px;background:var(--sidebar);border:1px solid var(--border);border-radius:6px">
      <span class="mono" style="color:var(--muted-foreground)">--sidebar</span><span style="color:var(--foreground)">left nav</span>
    </div>
    <div class="row" style="justify-content:space-between;padding:8px 12px;background:var(--secondary);border:1px solid var(--border);border-radius:6px">
      <span class="mono" style="color:var(--muted-foreground)">--secondary</span><span style="color:var(--foreground)">chips, sec btn</span>
    </div>
    <div class="row" style="justify-content:space-between;padding:8px 12px;background:var(--muted);border:1px solid var(--border);border-radius:6px">
      <span class="mono" style="color:var(--muted-foreground)">--muted</span><span style="color:var(--foreground)">subtle bg</span>
    </div>
    <div class="row" style="justify-content:space-between;padding:8px 12px;background:var(--primary);border:1px solid var(--border);border-radius:6px">
      <span class="mono" style="color:var(--primary-foreground);opacity:0.7">--primary</span><span style="color:var(--primary-foreground)">primary CTA</span>
    </div>
  </div>
</div></body></html>
