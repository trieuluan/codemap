<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Inputs</title></head><body><div class="card">
  <div class="eyebrow">Form controls — h-9, border-input, rounded-md</div>
  <div class="col" style="gap:10px;max-width:380px">
    <input placeholder="you@example.com" style="height:36px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--foreground);font:400 14px var(--font-sans);outline:none">
    <div style="position:relative">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted-foreground);font-size:14px">⌕</span>
      <input placeholder="Search files, symbols, exports…" style="width:100%;box-sizing:border-box;height:36px;padding:0 12px 0 32px;border-radius:8px;border:1px solid var(--border);background:var(--secondary);color:var(--foreground);font:400 14px var(--font-sans);outline:none">
    </div>
    <input value="Production key" style="height:36px;padding:0 12px;border-radius:8px;border:1px solid var(--ring);box-shadow:0 0 0 3px color-mix(in oklch, var(--ring) 50%, transparent);background:transparent;color:var(--foreground);font:400 14px var(--font-sans);outline:none">
    <textarea placeholder="Describe what this key is for" rows="2" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--foreground);font:400 14px var(--font-sans);outline:none;resize:none"></textarea>
  </div>
</div></body></html>
