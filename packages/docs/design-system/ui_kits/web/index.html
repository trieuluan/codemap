<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeMap — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { background: var(--background); }
  body { margin: 0; min-height: 100vh; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-foreground); }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  /* lucide icons render as inline SVG; size via CSS */
  [data-lucide] { width: 16px; height: 16px; stroke-width: 2; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<script>
  // Read saved theme; default to dark (CodeMap's canonical experience)
  (function() {
    var saved = localStorage.getItem("codemap-theme") || "dark";
    document.documentElement.classList.toggle("dark", saved === "dark");
  })();
</script>
<div id="root"></div>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="header.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="projects.jsx"></script>
<script type="text/babel" src="project-detail.jsx"></script>
<script type="text/babel" src="project-map.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
