# .codex/config.toml
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
# bật khi thật sự cần command có network
network_access = false
# nếu Codex cần sửa thêm ngoài cwd hiện tại, khai báo rõ
writable_roots = ["/workspace"]

[mcp_servers.openai_docs]
transport = "streamable_http"
url = "https://developers.openai.com/mcp"

# Placeholder examples below.
# Replace these with the actual command/config for the MCP servers you install.

[mcp_servers.postgres]
transport = "stdio"
command = "your-postgres-mcp-server"
args = ["--connection-string", "postgresql://app:123456@codemap_pg:5432/codemap_mvp"]

[mcp_servers.api]
transport = "stdio"
command = "your-http-mcp-server"
args = ["--base-url", "http://localhost:3001"]

