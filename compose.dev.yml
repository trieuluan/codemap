services:
  workspace:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: codemap-workspace-dev
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - codemap_node_modules:/workspace/node_modules
    command: sh -c "sleep infinity"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      HOST: ${HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3001}
      WEB_PORT: ${WEB_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_PORT:-3001}:3001"
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-18}
    container_name: ${POSTGRES_CONTAINER_NAME:-codemap_pg}
    restart: ${POSTGRES_RESTART_POLICY:-unless-stopped}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - codemap_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: codemap-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - codemap_redis_data:/data

volumes:
  codemap_node_modules:
  codemap_postgres_data:
  codemap_redis_data:
